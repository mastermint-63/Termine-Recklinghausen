<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <style>
    .line { fill: none; stroke: #2c1810; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fill-body { fill: #f5e6d0; stroke: #2c1810; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fill-shoe { fill: #2c1810; stroke: #2c1810; stroke-width: 2; }
    .fill-eye { fill: #2c1810; }
    .fill-white { fill: white; stroke: #2c1810; stroke-width: 2; }
  </style>

  <!-- 3 Haare -->
  <path class="line" d="M 95,42 C 90,30 85,22 82,16"/>
  <path class="line" d="M 100,40 C 100,28 102,18 100,12"/>
  <path class="line" d="M 105,42 C 110,30 115,22 118,16"/>

  <!-- Kopf (birnenförmig) -->
  <path class="fill-body" d="M 68,95 C 68,60 80,40 100,40 C 120,40 132,60 132,95 C 132,115 120,125 100,125 C 80,125 68,115 68,95 Z"/>

  <!-- Augen (groß, rund, leicht melancholisch) -->
  <ellipse class="fill-white" cx="86" cy="82" rx="12" ry="14"/>
  <ellipse class="fill-white" cx="114" cy="82" rx="12" ry="14"/>
  <!-- Pupillen -->
  <ellipse class="fill-eye" cx="89" cy="85" rx="5" ry="6"/>
  <ellipse class="fill-eye" cx="117" cy="85" rx="5" ry="6"/>
  <!-- Augenbrauen (leicht besorgt/gutmütig) -->
  <path class="line" d="M 74,68 C 78,64 84,64 90,67"/>
  <path class="line" d="M 110,67 C 116,64 122,64 126,68"/>

  <!-- Nase (breit, rund) -->
  <ellipse cx="100" cy="98" rx="8" ry="5" fill="#e8d4b8" stroke="#2c1810" stroke-width="2"/>

  <!-- Mund (freundliches Grinsen) -->
  <path class="line" d="M 88,110 C 92,118 108,118 112,110"/>

  <!-- Oberer Körper (Kugelsegment) -->
  <ellipse class="fill-body" cx="100" cy="170" rx="42" ry="45"/>

  <!-- Unterer Körper (Kugelsegment, etwas kleiner) -->
  <ellipse class="fill-body" cx="100" cy="230" rx="32" ry="30"/>

  <!-- Obere Arme (am oberen Körpersegment) -->
  <path class="line" d="M 60,155 C 40,148 28,155 30,168"/>
  <circle cx="30" cy="170" r="5" fill="#f5e6d0" stroke="#2c1810" stroke-width="2"/>
  <path class="line" d="M 140,155 C 160,148 172,155 170,168"/>
  <circle cx="170" cy="170" r="5" fill="#f5e6d0" stroke="#2c1810" stroke-width="2"/>

  <!-- Untere Arme (am unteren Körpersegment) -->
  <path class="line" d="M 70,220 C 50,215 38,222 40,234"/>
  <circle cx="40" cy="236" r="5" fill="#f5e6d0" stroke="#2c1810" stroke-width="2"/>
  <path class="line" d="M 130,220 C 150,215 162,222 160,234"/>
  <circle cx="160" cy="236" r="5" fill="#f5e6d0" stroke="#2c1810" stroke-width="2"/>

  <!-- Schuhe (dunkel, kugelig) -->
  <ellipse class="fill-shoe" cx="80" cy="268" rx="16" ry="12"/>
  <ellipse class="fill-shoe" cx="120" cy="268" rx="16" ry="12"/>

  <!-- Beine (kurz, verbinden Körper mit Schuhen) -->
  <line class="line" x1="85" y1="255" x2="82" y2="260"/>
  <line class="line" x1="115" y1="255" x2="118" y2="260"/>
</svg>
