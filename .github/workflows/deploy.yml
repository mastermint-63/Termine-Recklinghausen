name: Deploy Dashboard

on:
  # Manuell auslösbar
  workflow_dispatch:
  # Bei Push von HTML-Dateien auf main
  push:
    branches: [main]
    paths:
      - 'termine_re_*.html'
      - 'index.html'
      - 'favicon*'
      - 'robots.txt'
      - 'sitemap.xml'

# Berechtigungen für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Dateien für Pages vorbereiten
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Auf GitHub Pages deployen
        uses: actions/deploy-pages@v5
